<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="">
        <label for="fullname">Name:</label><br>
        <input type="text" placeholder="enter your name" id="fullname" Name="fullname"><br>
        <!--Email-->
        <label for="email ID"> Email ID:</label><br>
        <input type="text" placeholder="enter email ID" id="email ID" Email ID="email ID"> <br>
        <!--password-->
        <label for="psw">Password:</label><br>
        <input type="text" placeholder="enter password" minlength="8" name="psw" id="psw"><br>
        <!-- number input -->
         <label for="age">Age:</label>
         <input type="number" name="age" id="age" min="18" max="100"><br>
        <!-- radio button -->
         <p>Experience Level:</p>
         <input type="radio" id="beginner" name="level">
         <label for="Experience">beginner</label>
         <p>Gender</p>
         <input type="radio" id="female" name="gender" value="female">
         <label for="gender">female</label>
         <input type="radio" id="male" name="gender" value="male">
         <label for="gender">male</label>
         <!-- checkbox -->
          <p>technologies</p>
          <input type="checkbox" name="html" value="html">
          <label for="html">HTML</label><br>
          <input type="checkbox" name="css" value="css">
          <label for="css">CSS</label><br>
          <!-- dropdown -->
           <label for="country">country</label>
           <select name="country" id="country">
            <option value="India">India</option>
            <option value="USa">USA</option>
            <option value="UK">UK</option>
            <option value="UAE">UAE</option>
            <option value="nepal">nepal</option>
           </select><br>
           <!-- text area -->
            <label for="message">Message</label>
            <textarea name="message" id="message" placeholder="enter the message"></textarea><br>
            <!-- file upload -->
             <label for="label">upload resume</label>
             <input type="file" name="resume" id="resume"><br>
             <!-- date picker -->
              <label for="dob">date of birth</label>
              <input type="date" name="dob" id="dob"><br>
        <!--button-->
        <button type="submit">submit</button>
        <button type="reset">reset</button>
    </form>
   
        
</body>
</html>
